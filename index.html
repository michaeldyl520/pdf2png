<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PNG Converter</title>
    <script src="js/pdf.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .drop-zone { border: 2px dashed #ccc; padding: 3rem; text-align: center; margin: 2rem 0; border-radius: 8px; cursor: pointer; }
        .drop-zone.dragover { border-color: #007bff; background: #f0f8ff; }
        button { background: #007bff; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .progress { margin: 1rem 0; }
        #status { color: #666; margin-top: 1rem; }
        #progress { font-family: monospace; }
    </style>
</head>
<body>
    <h1>PDF to PNG Converter</h1>
    <div class="drop-zone" id="dropZone">
        <p>Drag & drop a PDF file here, or click to select</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" hidden>
    <div id="fileName"></div>
    <button id="convertBtn" disabled>Convert All Pages to PNG</button>
    <div id="progress"></div>
    <div id="status"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const fileNameDiv = document.getElementById('fileName');
        const progressDiv = document.getElementById('progress');
        const statusDiv = document.getElementById('status');

        let pdfDoc = null;
        let selectedFileName = '';

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.pdf')) {
                await loadPdf(file);
            } else {
                statusDiv.textContent = 'Please select a PDF file';
            }
        });

        fileInput.addEventListener('change', async () => {
            if (fileInput.files[0]) {
                await loadPdf(fileInput.files[0]);
            }
        });

        async function loadPdf(file) {
            statusDiv.textContent = 'Loading PDF...';
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            selectedFileName = file.name.replace('.pdf', '');
            fileNameDiv.textContent = `Selected: ${file.name} (${pdfDoc.numPages} pages)`;
            convertBtn.disabled = false;
            statusDiv.textContent = '';
            progressDiv.textContent = '';
        }

        convertBtn.addEventListener('click', async () => {
            if (!pdfDoc) return;

            convertBtn.disabled = true;
            statusDiv.textContent = 'Converting...';

            const scale = 2;
            const totalPages = pdfDoc.numPages;

            for (let i = 1; i <= totalPages; i++) {
                progressDiv.textContent = `Processing page ${i}/${totalPages}`;

                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const ctx = canvas.getContext('2d');

                await page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise;

                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `${selectedFileName}_page${i}.png`;
                link.href = dataUrl;
                link.click();

                progressDiv.textContent = `Page ${i}/${totalPages} saved`;
            }

            statusDiv.textContent = `Complete! ${totalPages} PNG files downloaded.`;
            convertBtn.disabled = false;
        });
    </script>
</body>
</html>
